<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InfoSpace Verifier</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #0e0e0e;
      --surface:   #181818;
      --border:    #2a2a2a;
      --text:      #e8e8e8;
      --muted:     #666;
      --accent:    #c8f135;
      --supported: #4ade80;
      --notsup:    #f87171;
      --insuf:     #fbbf24;
      --radius:    4px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 420px;
      min-height: 200px;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      line-height: 1.5;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-dot {
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
    }
    .logo-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--accent);
      text-transform: uppercase;
    }
    .api-status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
    }
    .status-dot {
      width: 5px; height: 5px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }
    .status-dot.online  { background: var(--supported); }
    .status-dot.offline { background: var(--notsup); }

    /* ── Input area ── */
    .input-area {
      padding: 14px 16px 0;
    }
    .input-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    textarea {
      width: 100%;
      height: 90px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      line-height: 1.5;
      padding: 10px 12px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus {
      border-color: #444;
    }
    textarea::placeholder { color: var(--muted); }

    /* ── Button ── */
    .btn-row {
      padding: 10px 16px 14px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    button {
      background: var(--accent);
      color: #0e0e0e;
      border: none;
      border-radius: var(--radius);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 8px 18px;
      cursor: pointer;
      transition: opacity 0.15s;
      flex-shrink: 0;
    }
    button:hover   { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .char-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-left: auto;
    }

    /* ── Divider ── */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 16px;
    }

    /* ── Loading ── */
    .loading {
      display: none;
      padding: 20px 16px;
      align-items: center;
      gap: 10px;
    }
    .loading.visible { display: flex; }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }
    .loading-step {
      display: inline-block;
      animation: blink 1.2s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* ── Results ── */
    #results {
      display: none;
      padding: 14px 16px;
      animation: fadeIn 0.3s ease;
    }
    #results.visible { display: block; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(4px)} to{opacity:1;transform:translateY(0)} }

    /* Summary box */
    .summary-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 12px;
    }
    .summary-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 6px;
    }
    .summary-text {
      font-size: 12px;
      line-height: 1.6;
      color: var(--text);
    }

    /* Stats row */
    .stats-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .stat-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 20px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
    }
    .stat-pill.supported { background: rgba(74,222,128,0.12); color: var(--supported); }
    .stat-pill.notsup    { background: rgba(248,113,113,0.12); color: var(--notsup); }
    .stat-pill.insuf     { background: rgba(251,191,36,0.12);  color: var(--insuf); }

    /* Claims list */
    .claims-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 8px;
    }
    .claim-item {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 6px;
      overflow: hidden;
    }
    .claim-header {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 9px 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .claim-header:hover { background: rgba(255,255,255,0.03); }

    .badge {
      flex-shrink: 0;
      margin-top: 1px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      font-weight: 500;
      padding: 2px 6px;
      border-radius: 3px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge.SUPPORTED     { background: rgba(74,222,128,0.15);  color: var(--supported); }
    .badge.NOT_SUPPORTED { background: rgba(248,113,113,0.15); color: var(--notsup); }
    .badge.INSUFFICIENT  { background: rgba(251,191,36,0.15);  color: var(--insuf); }

    .claim-text {
      font-size: 12px;
      line-height: 1.5;
      flex: 1;
    }
    .chevron {
      flex-shrink: 0;
      margin-top: 2px;
      color: var(--muted);
      font-size: 10px;
      transition: transform 0.2s;
    }
    .claim-item.open .chevron { transform: rotate(180deg); }

    .claim-detail {
      display: none;
      padding: 0 10px 10px 10px;
      border-top: 1px solid var(--border);
    }
    .claim-item.open .claim-detail { display: block; }

    .detail-section {
      margin-top: 8px;
    }
    .detail-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
    }
    .detail-text {
      font-size: 11px;
      line-height: 1.5;
      color: #aaa;
    }
    .source-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 2px 7px;
      margin-top: 4px;
    }

    /* Error */
    .error-box {
      display: none;
      margin: 14px 16px;
      padding: 10px 12px;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--notsup);
    }
    .error-box.visible { display: block; }

    /* Config section */
    .config-row {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .config-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .config-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 5px 8px;
      outline: none;
    }
    .config-input:focus { border-color: #444; }
    .save-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 5px 10px;
      font-size: 10px;
    }
    .save-btn:hover { border-color: #444; color: var(--text); opacity: 1; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">InfoSpace Verifier</span>
    </div>
    <div class="api-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">checking...</span>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <div class="input-label">Text to verify</div>
    <textarea id="inputText" placeholder="Вставте текст або речення для перевірки..."></textarea>
  </div>

  <div class="btn-row">
    <button id="verifyBtn">Verify →</button>
    <span class="char-count" id="charCount">0 chars</span>
  </div>

  <div class="divider"></div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <span class="loading-text">
      <span class="loading-step" id="loadingStep">Extracting claims...</span>
    </span>
  </div>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Results -->
  <div id="results">
    <div class="summary-box">
      <div class="summary-label">Summary</div>
      <div class="summary-text" id="summaryText"></div>
    </div>

    <div class="stats-row" id="statsRow"></div>

    <div class="claims-label">Claims breakdown</div>
    <div id="claimsList"></div>
  </div>

  <!-- Config -->
  <div class="config-row">
    <span class="config-label">API</span>
    <input class="config-input" id="apiUrl" type="text" placeholder="http://localhost:8000" />
    <button class="save-btn" id="saveBtn">Save</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
